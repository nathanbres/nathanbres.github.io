<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#0a1628"/>
  
  <!-- Grid lines -->
  <line x1="60" y1="20" x2="60" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="130" y1="20" x2="130" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="200" y1="20" x2="200" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="270" y1="20" x2="270" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="340" y1="20" x2="340" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="370" y2="40" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="80" x2="370" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="120" x2="370" y2="120" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Perfect prediction line -->
  <line x1="60" y1="155" x2="340" y2="35" stroke="rgba(200,169,110,0.4)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Scatter points — blues (over-predicted) -->
  <circle cx="90" cy="110" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="130" cy="85" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="160" cy="95" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="200" cy="70" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="240" cy="55" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="175" cy="75" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="210" cy="90" r="5" fill="#2563eb" opacity="0.85"/>
  <circle cx="280" cy="50" r="5" fill="#2563eb" opacity="0.85"/>

  <!-- Scatter points — reds (under-predicted) -->
  <circle cx="110" cy="125" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="150" cy="115" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="190" cy="105" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="230" cy="80" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="260" cy="68" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="300" cy="52" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="320" cy="42" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="75" cy="140" r="5" fill="#dc2626" opacity="0.85"/>

  <!-- Axes -->
  <line x1="55" y1="20" x2="55" y2="162" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="54" y1="161" x2="360" y2="161" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Labels -->
  <text x="200" y="185" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Actual OPS</text>
  <text x="22" y="95" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" transform="rotate(-90,22,95)">Predicted OPS</text>

  <!-- Title area -->
  <text x="200" y="207" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(200,169,110,0.7)" letter-spacing="1">OPS PREDICTION MODEL · LINEAR REGRESSION</text>
  
  <!-- RMSE badge -->
  <rect x="270" y="25" width="85" height="28" rx="2" fill="rgba(37,99,235,0.2)" stroke="rgba(37,99,235,0.4)" stroke-width="0.5"/>
  <text x="312" y="36" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">RMSE</text>
  <text x="312" y="48" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#93c5fd" font-weight="500">0.0566</text>
  
  <!-- R2 badge -->
  <rect x="270" y="60" width="85" height="28" rx="2" fill="rgba(22,163,74,0.2)" stroke="rgba(22,163,74,0.4)" stroke-width="0.5"/>
  <text x="312" y="71" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">R²</text>
  <text x="312" y="83" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#86efac" font-weight="500">0.206</text>
</svg>
