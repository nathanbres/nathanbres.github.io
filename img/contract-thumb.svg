<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#0a1628"/>

  <!-- Grid lines -->
  <line x1="60" y1="20" x2="60" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="130" y1="20" x2="130" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="200" y1="20" x2="200" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="270" y1="20" x2="270" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="340" y1="20" x2="340" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="370" y2="40" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="80" x2="370" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="120" x2="370" y2="120" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Fair value line $8M/WAR -->
  <line x1="60" y1="158" x2="340" y2="30" stroke="rgba(200,169,110,0.5)" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Undervalued dots (green) — above the line -->
  <circle cx="72" cy="95" r="5" fill="#16a34a" opacity="0.9"/>
  <circle cx="88" cy="60" r="6" fill="#16a34a" opacity="0.9"/>
  <circle cx="105" cy="100" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="120" cy="72" r="5" fill="#16a34a" opacity="0.85"/>
  <circle cx="148" cy="55" r="6" fill="#16a34a" opacity="0.9"/>
  <circle cx="170" cy="80" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="195" cy="48" r="5" fill="#16a34a" opacity="0.9"/>
  <circle cx="215" cy="65" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="238" cy="50" r="5" fill="#16a34a" opacity="0.85"/>

  <!-- Pitcher diamonds (green) — above the line -->
  <polygon points="135,42 142,52 135,62 128,52" fill="#16a34a" opacity="0.85"/>
  <polygon points="180,35 187,45 180,55 173,45" fill="#16a34a" opacity="0.9"/>
  <polygon points="100,78 107,88 100,98 93,88" fill="#16a34a" opacity="0.8"/>

  <!-- Overpaid dots (red) — below the line -->
  <circle cx="310" cy="145" r="7" fill="#dc2626" opacity="0.9"/>
  <circle cx="280" cy="138" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="255" cy="125" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="325" cy="135" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="295" cy="118" r="4" fill="#dc2626" opacity="0.8"/>

  <!-- Overpaid pitcher diamonds (red) -->
  <polygon points="340,128 347,138 340,148 333,138" fill="#dc2626" opacity="0.85"/>
  <polygon points="315,108 322,118 315,128 308,118" fill="#dc2626" opacity="0.8"/>

  <!-- Axes -->
  <line x1="55" y1="20" x2="55" y2="162" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="54" y1="161" x2="370" y2="161" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="210" y="178" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Salary</text>
  <text x="22" y="95" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" transform="rotate(-90,22,95)">WAR</text>

  <!-- Legend -->
  <circle cx="68" cy="174" r="4" fill="#16a34a" opacity="0.9"/>
  <text x="76" y="178" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Undervalued</text>
  <circle cx="148" cy="174" r="4" fill="#dc2626" opacity="0.9"/>
  <text x="156" y="178" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Overpaid</text>
  <polygon points="228,170 232,176 228,182 224,176" fill="rgba(255,255,255,0.4)"/>
  <text x="236" y="178" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Pitcher</text>

  <!-- Title -->
  <text x="200" y="207" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(200,169,110,0.7)" letter-spacing="1">CONTRACT VALUE · $/WAR ANALYSIS · 2025</text>

  <!-- Surplus badge -->
  <rect x="268" y="22" width="90" height="28" rx="2" fill="rgba(22,163,74,0.2)" stroke="rgba(22,163,74,0.4)" stroke-width="0.5"/>
  <text x="313" y="33" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">BEST SURPLUS</text>
  <text x="313" y="45" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#86efac" font-weight="500">+$54.3M</text>

  <!-- $/WAR badge -->
  <rect x="268" y="57" width="90" height="28" rx="2" fill="rgba(200,169,110,0.15)" stroke="rgba(200,169,110,0.35)" stroke-width="0.5"/>
  <text x="313" y="68" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">MKT RATE</text>
  <text x="313" y="80" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C8A96E" font-weight="500">$8M/WAR</text>
</svg>
